name: Publish Docker image (AMD64 only)

on:
  push:
    branches:
      - main
      - beta
      - dev
      - test
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build_amd64:
    name: Build & push (amd64)
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: tags
        run: |
          # Normalize repository name to lowercase
          GHCR_REPO="${GITHUB_REPOSITORY,,}"
          echo "GHCR_REPO=$GHCR_REPO" >> $GITHUB_ENV

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push: use tag name (lowercase)
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG,,}"
            echo "TAGS=ghcr.io/${GHCR_REPO}:${VERSION}" >> $GITHUB_OUTPUT
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Building tag: $TAG -> $VERSION"

          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Main branch: tag as latest
            echo "TAGS=ghcr.io/${GHCR_REPO}:latest" >> $GITHUB_OUTPUT
            echo "VERSION=latest" >> $GITHUB_ENV
            echo "Building main branch -> latest"

          elif [[ "${{ github.ref }}" == refs/heads/beta ]]; then
            # Beta branch: tag as beta
            echo "TAGS=ghcr.io/${GHCR_REPO}:beta" >> $GITHUB_OUTPUT
            echo "VERSION=beta" >> $GITHUB_ENV
            echo "Building beta branch -> beta"

          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            # Dev branch: tag as dev
            echo "TAGS=ghcr.io/${GHCR_REPO}:dev" >> $GITHUB_OUTPUT
            echo "VERSION=dev" >> $GITHUB_ENV
            echo "Building dev branch -> dev"

          elif [[ "${{ github.ref }}" == refs/heads/test ]]; then
            # Test branch: tag as test
            echo "TAGS=ghcr.io/${GHCR_REPO}:test" >> $GITHUB_OUTPUT
            echo "VERSION=test" >> $GITHUB_ENV
            echo "Building test branch -> test"

          else
            echo "Unknown ref: ${{ github.ref }}"
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Build default frontend
        working-directory: web/default
        run: |
          bun install
          VITE_REACT_APP_VERSION="${VERSION}" bun run build

      - name: Build classic frontend
        working-directory: web/classic
        run: |
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION="${VERSION}" bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPO }}

      - name: Build & push (amd64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Sign image with cosign
        run: cosign sign --yes ghcr.io/${GHCR_REPO}@${{ steps.build.outputs.digest }}

      - name: Output digest
        run: |
          echo "### Docker Image Digest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.TAGS }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
