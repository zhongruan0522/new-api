# Dashboard statistics and analytics

type DashboardOverview {
  totalRequests: Int!
  requestStats: RequestStats!
  failedRequests: Int!
  averageResponseTime: Float
}

type RequestStats {
  requestsToday: Int!
  requestsThisWeek: Int!
  requestsLastWeek: Int!
  requestsThisMonth: Int!
}

type RequestStatsByChannel {
  channelName: String!
  count: Int!
}

type RequestStatsByModel {
  modelId: String!
  count: Int!
}

type RequestStatsByAPIKey {
  apiKeyId: ID!
  apiKeyName: String!
  count: Int!
}

type TokenStatsByAPIKey {
  apiKeyId: ID!
  apiKeyName: String!
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int!
  reasoningTokens: Int!
  totalTokens: Int!
}

input APIKeyTokenUsageStatsInput {
  apiKeyIds: [ID!]
  createdAtGTE: Time
  createdAtLTE: Time
}

type APIKeyTokenUsageStats {
  apiKeyId: ID!
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int!
  reasoningTokens: Int!
  topModels: [ModelTokenUsageStats!]!
}

type ModelTokenUsageStats {
  modelId: String!
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int!
  reasoningTokens: Int!
}

type DailyRequestStats {
  date: String!
  count: Int!
  tokens: Int!
  cost: Float!
}

type HourlyRequestStats {
  hour: Int!
  count: Int!
}

type TokenStats {
  totalInputTokensToday: Int!
  totalOutputTokensToday: Int!
  totalCachedTokensToday: Int!

  totalInputTokensThisWeek: Int!
  totalOutputTokensThisWeek: Int!
  totalCachedTokensThisWeek: Int!

  totalInputTokensThisMonth: Int!
  totalOutputTokensThisMonth: Int!
  totalCachedTokensThisMonth: Int!

  totalInputTokensAllTime: Int!
  totalOutputTokensAllTime: Int!
  totalCachedTokensAllTime: Int!
  lastUpdated: Time
}

type TopRequestsProjects {
  projectId: ID!
  projectName: String!
  projectDescription: String!
  requestCount: Int!
}

type ChannelSuccessRate {
  channelId: ID!
  channelName: String!
  channelType: String!
  successCount: Int!
  failedCount: Int!
  totalCount: Int!
  successRate: Float!
}

type FastestChannel {
  channelId: ID!
  channelName: String!
  channelType: String!
  throughput: Float!
  tokensCount: Int!
  latencyMs: Int!
  requestCount: Int!
  confidenceLevel: String!
}

type FastestModel {
  modelId: String!
  modelName: String!
  throughput: Float!
  tokensCount: Int!
  latencyMs: Int!
  requestCount: Int!
  confidenceLevel: String!
}

"""
Performance statistics for a specific model on a given date
"""
type ModelPerformanceStat {
  date: String!
  modelId: String!
  throughput: Float
  ttftMs: Float
  requestCount: Int!
}

"""
Performance statistics for a specific channel on a given date
"""
type ChannelPerformanceStat {
  date: String!
  channelId: String!
  channelName: String!
  throughput: Float
  ttftMs: Float
  requestCount: Int!
}

input FastestChannelsInput {
  timeWindow: String!
  limit: Int = 5
}

"""
Token usage statistics grouped by channel
"""
type TokenStatsByChannel {
  channelName: String!
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int!
  reasoningTokens: Int!
  totalTokens: Int!
}

"""
Token usage statistics grouped by model
"""
type TokenStatsByModel {
  modelId: String!
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int!
  reasoningTokens: Int!
  totalTokens: Int!
}

"""
Cost statistics grouped by channel
"""
type CostStatsByChannel {
  channelName: String!
  cost: Float!
}

"""
Cost statistics grouped by model
"""
type CostStatsByModel {
  modelId: String!
  cost: Float!
}

"""
Cost statistics grouped by API key
"""
type CostStatsByAPIKey {
  apiKeyId: ID!
  apiKeyName: String!
  cost: Float!
}

extend type Query {
  dashboardOverview: DashboardOverview!
  requestStats: RequestStats!
  requestStatsByChannel(timeWindow: String): [RequestStatsByChannel!]!
  requestStatsByModel(timeWindow: String): [RequestStatsByModel!]!
  requestStatsByAPIKey(timeWindow: String): [RequestStatsByAPIKey!]!
  tokenStatsByAPIKey(timeWindow: String): [TokenStatsByAPIKey!]!
  apiKeyTokenUsageStats(
    input: APIKeyTokenUsageStatsInput
  ): [APIKeyTokenUsageStats!]!
  dailyRequestStats: [DailyRequestStats!]!
  topRequestsProjects: [TopRequestsProjects!]!
  tokenStats: TokenStats!
  channelSuccessRates: [ChannelSuccessRate!]!
  fastestChannels(input: FastestChannelsInput!): [FastestChannel!]!
  fastestModels(input: FastestChannelsInput!): [FastestModel!]!
  """
  Get performance statistics for models over time
  """
  modelPerformanceStats: [ModelPerformanceStat!]!
  """
  Get performance statistics for channels over time
  """
  channelPerformanceStats: [ChannelPerformanceStat!]!
  tokenStatsByChannel(timeWindow: String): [TokenStatsByChannel!]!
  tokenStatsByModel(timeWindow: String): [TokenStatsByModel!]!
  costStatsByChannel(timeWindow: String): [CostStatsByChannel!]!
  costStatsByModel(timeWindow: String): [CostStatsByModel!]!
  costStatsByAPIKey(timeWindow: String): [CostStatsByAPIKey!]!
}
